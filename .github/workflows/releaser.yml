name: releaser

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-toolchains
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu gcc-i686-linux-gnu

      - run: rustup target add aarch64-unknown-linux-gnu i686-unknown-linux-gnu

      - name: Build x86_64 (native)
        run: |
          cargo build --release
          cp target/release/web_search web_search-x86_64-unknown-linux-gnu

      - name: Build aarch64 (cross)
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/web_search web_search-aarch64-unknown-linux-gnu
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build i686 (cross)
        run: |
          cargo build --release --target i686-unknown-linux-gnu
          cp target/i686-unknown-linux-gnu/release/web_search web_search-i686-unknown-linux-gnu
        env:
          CC_i686_unknown_linux_gnu: i686-linux-gnu-gcc
          AR_i686_unknown_linux_gnu: i686-linux-gnu-ar
          CARGO_TARGET_I686_UNKNOWN_LINUX_GNU_LINKER: i686-linux-gnu-gcc

      - uses: actions/upload-artifact@v7
        with:
          name: linux-binaries
          path: web_search-*-unknown-linux-gnu

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: Swatinem/rust-cache@v2

      - run: rustup target add x86_64-apple-darwin

      - name: Build aarch64 (native)
        run: |
          cargo build --release
          cp target/release/web_search web_search-aarch64-apple-darwin

      - name: Build x86_64 (cross)
        run: |
          cargo build --release --target x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/web_search web_search-x86_64-apple-darwin

      - uses: actions/upload-artifact@v7
        with:
          name: macos-binaries
          path: web_search-*-apple-darwin

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: Swatinem/rust-cache@v2

      - run: rustup target add aarch64-pc-windows-msvc i686-pc-windows-msvc

      - name: Build x86_64 (native)
        run: |
          cargo build --release
          cp target/release/web_search.exe web_search-x86_64-pc-windows-msvc.exe

      - name: Build aarch64 (cross)
        run: |
          cargo build --release --target aarch64-pc-windows-msvc
          cp target/aarch64-pc-windows-msvc/release/web_search.exe web_search-aarch64-pc-windows-msvc.exe

      - name: Build i686 (cross)
        run: |
          cargo build --release --target i686-pc-windows-msvc
          cp target/i686-pc-windows-msvc/release/web_search.exe web_search-i686-pc-windows-msvc.exe

      - uses: actions/upload-artifact@v7
        with:
          name: windows-binaries
          path: web_search-*-pc-windows-msvc.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: "*-binaries"
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: web_search-*
